<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal de informes</title>
    <meta
      name="description"
      content="Portal privado para consultar informes mensuales por cliente."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <section class="hero">
        <p class="eyebrow">Portal privado Colombia</p>
        <h1>Clientes activos</h1>
        <p class="lede">Informes mensuales en un solo lugar.</p>
        <div class="hero-pill">
          <span class="hero-pill-value" id="hero-client-count">37</span>
          <span class="hero-pill-label">clientes activos</span>
        </div>
      </section>

      <main class="portal-layout">
        <section class="panel access-panel">
          <div class="panel-header">
            <p class="panel-kicker">Acceso</p>
            <h2>Entrar al historial</h2>
          </div>

          <form id="access-form" class="access-form">
            <label class="field">
              <span class="field-label">Listado de clientes</span>
              <select id="client-select" class="field-control">
                <option value="">Selecciona un cliente</option>
              </select>
            </label>

            <div class="access-row">
              <label class="field field--compact">
                <span class="field-label">Codigo de seguridad</span>
                <input
                  id="client-pin"
                  class="field-control field-control--pin"
                  type="password"
                  inputmode="numeric"
                  maxlength="4"
                  placeholder="••••"
                  autocomplete="one-time-code"
                />
              </label>

              <button type="submit" class="primary-button">Abrir</button>
            </div>

            <p id="access-feedback" class="access-feedback" aria-live="polite"></p>
          </form>
        </section>

        <section class="panel client-panel hidden" id="client-panel">
          <div class="panel-header">
            <div>
              <p class="panel-kicker">Historial</p>
              <h2 id="client-name">Cliente</h2>
            </div>
            <button id="sign-out" class="ghost-button" type="button">Cerrar</button>
          </div>

          <div class="timeline" id="timeline"></div>
        </section>
      </main>
    </div>

    <script src="./assets/app.js"></script>
  </body>
</html>
